services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bigbanana-web
    ports:
      - "13000:80"
    depends_on:
      - media-proxy
      - config-api
    restart: unless-stopped

  media-proxy:
    build:
      context: .
      dockerfile: Dockerfile.media-proxy
    container_name: bigbanana-media-proxy
    environment:
      MEDIA_PROXY_PORT: "8787"
      MEDIA_PROXY_ALLOWED_HOSTS: "volces.com"
      MEDIA_PROXY_ALLOWED_PROTOCOLS: "https"
      MEDIA_PROXY_TIMEOUT_MS: "120000"
      MEDIA_PROXY_MAX_URL_LENGTH: "4096"
      MEDIA_PROXY_CORS_ORIGIN: "*"
    expose:
      - "8787"
    restart: unless-stopped

  config-api:
    build:
      context: .
      dockerfile: Dockerfile.config-api
    container_name: bigbanana-config-api
    environment:
      CONFIG_API_PORT: "8788"
      CONFIG_DB_PATH: "/data/config.db"
      CONFIG_API_MAX_BODY_BYTES: "1048576"
    volumes:
      - ./data:/data
    expose:
      - "8788"
    restart: unless-stopped
