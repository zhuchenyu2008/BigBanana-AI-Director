<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>BigBanana AI Director</title>
    <meta name="description" content="BigBanana AI Director - 开源 AI 剧本/分镜/视频制作工作台" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Theme: set attribute before CSS loads -->
    <script>
      (function () {
        var t = localStorage.getItem('bigbanana_theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Base styles / theme variables -->
    <link rel="stylesheet" href="/styles/theme-dark.css" />
    <link rel="stylesheet" href="/styles/theme-light.css" />

    <!-- Tailwind CDN (rolled back as requested to restore styles) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Vite dev entry (production build will replace this with bundled assets) -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
